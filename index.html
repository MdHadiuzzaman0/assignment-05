<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">

</head>

<body class="max-w-[520px] shadow-2xl rounded-xl mx-auto p-8">

    <div class="flex items-center flex-col mb-4">
        <img src="./assets/github-logo.png" alt="">
        <h1 class="font-semibold text-2xl mt-4 text-[#1F2937]">GitHub Issues Tracker</h1>
        <h3 class="text-[16px] text-[#64748B]">Sign in to manage your issues</h3>
    </div>

    <fieldset class="fieldset rounded-box w-full p-4 text-[16px]">

        <label class="label font-medium text-[#1F2937] ">Username</label>
        <input id="username" type="text" class="input w-full text-[#64748B]" placeholder="Enter Username" />
        <label class="label text-[14px] text-[#4A00FF] mb-5">Default: admin</label>

        <label class="label font-medium text-[#1F2937] ">Password</label>
        <input id="password" type="password" class="input w-full text-[#64748B]"" placeholder=" Enter Password" />
        <label class="label text-[14px] text-[#4A00FF]">Default: admin123</label>

        <button id="signInBtn" class="btn btn-neutral mt-4 p-6 bg-[#4A00FF] font-semibold text-white border-0 shadow-none">Sign In</button>

    </fieldset>

    <div class="divider mb-6">OR</div>

    <div class="text-center">
        <h3 class="text-[#64748B] text-[14px] mb-3">Demo Credentials:</h3>
        <p class="bg-[#F8FAFC] p-4 rounded-xl"><span class="font-bold">Username:</span> <span>admin</span> <br>
            <span class="font-bold">Password:</span> <span>admin123</span>
        </p>
    </div>


    <script src="./index.js"></script>
</body>

</html>
