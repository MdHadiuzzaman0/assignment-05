  <body class="bg-[#F8FAFC] h-screen">
    
    <section class="navbar bg-base-100 shadow-sm flex justify-between ">
      <div class="flex items-center">
        <img src="./assets/github-logo.png" alt="" class="h-[40px] ml-9"/>
        <a class="btn btn-ghost text-2xl font-bold p-1">GitHub Issues Tracker</a>
      </div>

      <div class="flex gap-2">
        <div class="searchBtn flex justify-center ">
          <div class="join">
            <div>
              <label class="input validator join-item">
                <input
                  id="inputSearch"
                  type="text"
                  placeholder="Search"
                  required
                />
              </label>
            </div>
            <button id="searchBtn" class="btn btn-primary join-item">
              Search
            </button>
          </div>
        </div>

        <button class="btn text-white bg-[#4A00FF] mr-9 hover:bg-blue-500"><i class="fa-solid fa-plus"></i> New Issues</button>
      </div>
    </section>



    <section id="btnSection" class="shadow-lg bg-white rounded-box h-20 w-10/12 mx-auto mt-15 p-5">

        <button onclick="allBtn(); showOnly('allBtn')" id="allBtn" class="btn text-black rounded-xl w-[120px]">All</button>
        <button onclick="openBtn(); showOnly('openBtn')" id="openBtn" class="btn text-black rounded-xl  w-[120px]">Open</button>
        <button onclick="closedBtn(); showOnly('closedBtn')" id="closedBtn" class="btn text-blck rounded-xl w-[120px]">Closed</button>
        
    </section>


    <section class="issueNum bg-white rounded-box h-20 w-10/12 mx-auto mt-5 p-5 flex justify-between">

        <div class="flex gap-2 items-center">
            <img src="./assets/Aperture.png" alt="" class="border border-red-600 rounded-3xl" rounded-full">
        <div>
            <h3 id="totalIssue" class="font-bold text-[20px]">_ _ _ _ _ _ _ _ _ _ </h3>
            <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
        </div>

        <div class="flex gap-2 items-center">
            <i class="fa-solid fa-circle text-green-400"></i>
            <h3>Open</h3>   
            <i class="fa-solid fa-circle text-[#A855F7] ml-2"></i>
            <h3>Closed</h3>
        </div>
    </section>

    <hr class="w-10/12 mx-auto text-[#64748B] opacity-10"> 

    <section id="cardContainerSection" class="shadow-lg w-10/12 mx-auto rounded-b-lg">

        <div id="cardContainer" class="grid lg:grid-cols-4 md:grid-cols-2 grid-cols-1 gap-5">
            
        </div>

        
        <div id="noIssueCard" class="text-center p-6 col-span-4 bg-white">
           <h1 class="text-2xl font-bold">No Issues Found!</h1>
           <p>Try searching for something else.</p>
        </div>
        

        <div id="spinner" class="hidden flex items-center"><span class="loading loading-spinner loading-xl w-1/12 mx-auto"></span></div>

        <!-- <div class="w-[290px] rounded-lg border p-5 space-y-6">

                <img src="./assets/Open-Status.png" alt="" class="h-full">

    <section>
        <!-- Open the modal using ID.showModal() method -->
       <!-- <button class="btn" onclick="my_modal_2.showModal()">open modal</button> -->
       <dialog id="issue_modal" class="modal ">
         <div class="modal-box max-w-[750px]">
            <div id="modalContainer"></div>
         </div>
         <form method="dialog" class="modal-backdrop">
           <button>close</button>
         </form>
       </dialog>
    </section>

   

<script>
let  allIssue=[];
const cardContainer=document.getElementById('cardContainer')
const cardContainerSection=document.getElementById('cardContainerSection')
const totalIssue=document.getElementById('totalIssue')
const modalContainer=document.getElementById('modalContainer')
const spinner=document.getElementById('spinner')
const noIssueCard=document.getElementById("noIssueCard")

function showSpinner(){
spinner.classList.remove('hidden');
noIssueCard.innerHTML="";
}

function hideSpinner(){
spinner.classList.add('hidden');

}

function showOnly(id){
    const selected = document.getElementById(id);
    const active=selected.classList.contains("bg-[#4A00FF]")
    document.querySelectorAll("#btnSection .btn").forEach(allBtn => {
        allBtn.classList.remove("bg-[#4A00FF]", "text-white")
        // allBtn.classList.add("bg-gold-300", "text-black")
    });

    
    if(!active){
        selected.classList.add("bg-[#4A00FF]", "text-white")
    }
}

function loadCard(){
    
    fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues')
   .then (response => response.json())
   .then ( alldata => {
    allIssue=alldata.data;
    console.log(alldata);
    console.log(allIssue);
  
 })
}
loadCard()

document.getElementById('searchBtn').addEventListener("click", function(){
    const input=document.getElementById('inputSearch');
    const searchText=input.value;
    // console.log(value);
    const data=allIssue;
    // console.log(data);
    if (searchText === "") {
        
        return; // Kichu na likhle search hobe na
    }
    noIssueCard.innerHTML="";
    noIssueCard.classList.remove("p-6")
    // API theke search result ana
    fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${searchText}`)
        .then(res => res.json())
        .then(data => {
            console.log(data);
            
            // Search result card-e dekhano
            if (data.data.length > 0) {
                cardContainer.innerHTML='';
                showCard(data.data);
                
            } else {
                // Kichu na paile "No Issues Found" dekhano
                cardContainer.innerHTML = `
                    `;
                    alert('type something')
                totalIssue.innerText = `0 Issues`;
            }

            document.querySelectorAll("#btnSection .btn").forEach(allbtn=>{
                allbtn.classList.remove("bg-[#4A00FF]", "text-white")
            })
        })
    
})

function allBtn(){
    showSpinner()
    showCard(allIssue);
    hideSpinner(); 
    
}

function openBtn(){
    showSpinner() 
    const openIssue=allIssue.filter(item => item.status === "open")
    showCard(openIssue);
    hideSpinner(); 
}

function closedBtn(){
    showSpinner()
    const closedIssue=allIssue.filter(item => item.status === "closed")
    hideSpinner(); 
    showCard(closedIssue);
    

}

function showCard(cardData){
    
    console.log(cardData.length)
    // totalIssue.innerHTML=`<h3 class="font-bold text-[20px]">${cardData.length} Issues</h3>`
    totalIssue.innerText = `${cardData.length} Issues`;

    if(cardContainer.children.length == cardData.length){
        cardContainer.innerHTML = `<div class="text-center col-span-4 mt-8 bg-white">
            <h1 class="text-2xl font-bold">No Issues Found!</h1>
            <p>Try searching for something else.</p>
            </div>`;
        totalIssue.innerHTML = `<h3class="font-bold text-[20px]">_ _ _ _ _ _ _ _ _ _ </h3>`
        return;
    }
    
    cardContainer.innerHTML='';
    noIssueCard.classList.remove("p-6")
    cardData.forEach(element => {


        

        const createdAt= new Date(element.createdAt);
        const date=createdAt.toLocaleDateString();
        // console.log(date);
        
        function getLabels(array){
            const labels=array.map(labels => `<h3 class="bg-red-300 py-1 px-3 rounded-xl">${labels}</h3>`)
            const result= labels.join(" ");
            return result;
         }

        cardContainerSection.classList.add("p-8", "bg-white");
        const cardDiv=document.createElement('div');
        cardDiv.className=`w-[290px] rounded-lg p-5 space-y-6 border border-black/20 border-t-8  shadow-lg ${element.status === 'open'? 'border-t-green-400 ' : 'border-t-[#A855F7]'}`
        cardDiv.innerHTML=`
        <div class="flex justify-between font-bold ">
                ${element.status === 'open'? `<img src="./assets/Open-Status.png" alt="" class='h-full'>` : `<img src="./assets/Closed- Status .png" alt="" class='h-full'>`}

               ${element.priority == 'high' ? `<h3 class="py-1 px-6 bg-[#FEECEC] text-red-400 rounded-lg">HIGH</h3>` : element.priority == 'medium' ? `<h3 class="py-1 px-6 bg-[#FFF6D1] text-amber-400 rounded-lg">MEDIUM</h3>` : `<h3 class="py-1 px-6 bg-[#EEEFF2] text-[#9CA3AF] rounded-lg">LOW</h3>`}
            </div>

            <div class="h-[76px] space-y-2 mb-13">
                <h3 onclick="modalInfo('${element.id}')" class="font-bold cursor-pointer">${element.title}</h3>
                <p  onclick="modalInfo('${element.id}')"  class="line-clamp-2 text-[#64748B] text-[14px] cursor-pointer">${element.description}</p>
            </div>

            <div class="flex flex-wrap gap-2">
    ${element.labels.map(label => {
        const val = label;
        
       
        const colorClass = 
            val === 'bug' ? 'bg-red-100 text-red-600 border-red-200' : 
            val === 'enhancement' ? 'bg-blue-100 text-blue-600 border-blue-200' : 
            val === 'help wanted' ? 'bg-green-100 text-green-600 border-green-200' : 
            val === 'good first issue' ? 'bg-purple-100 text-purple-600 border-purple-200' : 
            val === 'documentation' ? 'bg-slate-100 text-slate-600 border-slate-200' : 
            'bg-gray-100 text-gray-500 border-gray-200';

        return `<h3 class="py-1 px-3 border rounded-full text-[10px] font-bold uppercase ${colorClass}">${label}</h3>`;
    }).join("")}
</div>

            <hr class="text-[#64748B]/40">

            <div>
                <h3 class="line-clamp-2 text-[#64748B] text-[14px]">#1 by ${element.author}</h3>
                <h3 class="line-clamp-2 text-[#64748B] text-[14px]">${date}</h3>
            </div>`

            cardContainer.append(cardDiv)
    });
    
}

showCard()

async function modalInfo(issueId){
    modalContainer.innerHTML="";
    console.log(issueId)
    const res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issue/${issueId}`)
    const data = await res.json();
    
    const date= new Date(data.data.createdAt);
    const time= date.toLocaleDateString();

    function showLabels(labels){
        const label=labels.map(item=>`<h3 class="bg-red-300 py-1 px-3 rounded-xl">${item}</h3>`);
        return label.join(" ");
    }

        // console.log(element);
        const modalDiv=document.createElement('div');
        modalDiv.className='w-[700px] mx-auto p-5 border rounded-xl space-y-3'
        modalDiv.innerHTML=`
        <h1 class="font-bold">${data.data.title}</h1>
        <div class="flex gap-4 items-center">
            <h3 class="text-black font-bold ${data.data.status === 'open'? "bg-green-400" : "bg-[#A855F7]"} uppercase rounded-xl px-4 py-2">${data.data.status}</h3> <i class="fa-solid fa-circle"></i>
            <p class="tetx-[14px] text-[#64748B]"> Opened by ${data.data.assignee}</p> <i class="fa-solid fa-circle"></i> 
            <p class="tetx-[14px] text-[#64748B]">${time}</p>
        </div>

        <div class="flex gap-5">
            ${data.data.labels.map(label => {
        const val = label.toLowerCase().trim();
        
       
        const colorClass = 
            val === 'bug' ? 'bg-red-100 text-red-600 border-red-200' : 
            val === 'enhancement' ? 'bg-blue-100 text-blue-600 border-blue-200' : 
            val === 'help wanted' ? 'bg-green-100 text-green-600 border-green-200' : 
            val === 'good first issue' ? 'bg-purple-100 text-purple-600 border-purple-200' : 
            val === 'documentation' ? 'bg-slate-100 text-slate-600 border-slate-200' : 
            'bg-gray-100 text-gray-500 border-gray-200';

        return `<h3 class="py-1 px-3 border rounded-full text-[11px] font-bold uppercase ${colorClass}">${label}</h3>`;
    }).join("")}
        </div>

        <P class="text-[#64748B]">${data.data.description}</P>

        <div class="flex gap-59 mt-9 bg-[#F8FAFC] p-4 rounded-xl">
            <div>
                <p class="tetx-[14px] text-[#64748B]">Assignee:</p>
                <p class="font-bold">${data.data.assignee}</p>
            </div>

            <div>
                <p class="text-[14px] text-[#64748B] mb-1">Priority:</p>
                <p>${data.data.priority == 'high' ? `<h3 class="py-1 font-bold px-6 bg-[#FEECEC] text-red-400 rounded-lg">HIGH</h3>` : data.data.priority == 'medium' ? `<h3 class="py-1 font-bold px-6 bg-[#FFF6D1] text-amber-400 rounded-lg">MEDIUM</h3>` : `<h3 class="py-1 px-6 font-bold bg-[#EEEFF2] text-[#9CA3AF] rounded-lg">LOW</h3>`}</p>
            </div>
        </div>`
        modalContainer.append(modalDiv)
        document.getElementById('issue_modal').showModal()
    ;
}



</script>

<script src="./manpage.js"></script>
