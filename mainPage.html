<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>

  </head>
  <body class="bg-[#F8FAFC] h-screen">
    
    <section class="navbar bg-base-100 shadow-sm flex justify-between ">

      <div class="flex items-center">
        <img src="./assets/github-logo.png" alt="" class="h-[40px] md:ml-5"/>
        <a class="btn btn-ghost text-2xl font-bold p-1 hidden md:block">GitHub Issues Tracker</a>
      </div>

      <div class="flex gap-2">
        <div class="searchBtn flex justify-center ">
          <div class="join">
            <div>
              <label class="input validator join-item">
                <input
                  id="inputSearch"
                  type="text"
                  placeholder="Search"
                  required
                />
              </label>
            </div>
            <button id="searchBtn" class="btn btn-primary join-item">
              Search
            </button>
          </div>
        </div>

        <button class="btn text-white bg-[#4A00FF] md:mr-5 hover:bg-blue-500"><i class="fa-solid fa-plus"></i> <span class="hidden lg:block"> New Issue</span></button>
      </div>
    </section>

    <section id="btnSection" class="shadow-lg bg-white rounded-box h-20 w-10/12 mx-auto mt-15 p-5 flex gap-3">

        <button  id="allBtn" class="btn text-black rounded-xl w-10 md:w-[120px]">All</button>
        <button  id="openBtn" class="btn text-black rounded-xl  w-[120px]">Open</button>
        <button id="closedBtn" class="btn text-blck rounded-xl w-[120px]">Closed</button>
        
    </section>

    <section class="issueNum bg-white rounded-box h-20 w-10/12 mx-auto mt-5 p-5 flex justify-between">

        <div class="flex gap-2 items-center">
            <img src="./assets/Aperture.png" alt="" class="border-6 border-slate-500 rounded-3xl" rounded-full">
        <div>
            <h3 id="totalIssue" class="font-bold text-[20px]">0 Issue</h3>
            <p class="text-[#64748B] hidden md:block">Track and manage your project issues</p>
        </div>
        </div>

        <div class="flex flex-col md:flex-row gap-2 items-center">
            <div class="flex items-center gap-2">
            <i class="fa-solid fa-circle text-green-400"></i>
            <h3>Open</h3>  
            </div>

            <div class='flex items-center gap-2'>
            <i class="fa-solid fa-circle text-[#A855F7] ml-2"></i>
            <h3>Closed</h3>
            </div>
        </div>
    </section>

    <hr class="w-10/12 mx-auto text-[#64748B] opacity-10"> 

    <section id="cardContainerSection" class="shadow-lg w-10/12 mx-auto rounded-b-lg">

        <div id="cardContainer" class="grid lg:grid-cols-4 md:grid-cols-2 grid-cols-1 gap-5">
            
        </div>

        <div id="noIssueCard" class="text-center p-6 col-span-4 bg-white rounded-b-lg">
           <h1 class="text-2xl font-bold">No Issues Found!</h1>
           <p class="font-bold">( 🖱️ Click on Title/Description line to open the modal!  )</p>
        </div>

        <div id="spinner" class="hidden flex items-center"><span class="loading loading-spinner loading-xl w-1/12 mx-auto"></span></div>

    </section>

    <section id="modal">
       <dialog id="issue_modal" class="modal ">
         <div class="modal-box max-w-[750px]">
            <div id="modalContainer"></div>
         </div>
         <form method="dialog" class="modal-backdrop">
           <button>close</button>
         </form>
       </dialog>
    </section>

<script src="./mainPage.js"></script>
  </body>
</html>
